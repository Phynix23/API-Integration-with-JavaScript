<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 2 - Display Users</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 cursor-pointer">
  <div class="grid grid-cols-3 gap-4" id="users"></div>

  <script>
    async function displayUsers() {
      try {
        const response = await fetch('https://jsonplaceholder.typicode.com/users');
        const users = await response.json();
        const container = document.getElementById('users');
        users.forEach(user => {
          container.innerHTML += `
          <div class="border p-4 rounded shadow">
            <div class="font-bold text-lg hover:bg-gray-100">${user.name}</div>
            <div class="text-sm text-gray-600 hover:bg-gray-300">${user.email}</div>`;
        });
      } catch (error) {
        console.error('Error fetching users:', error);
      }
    }
    displayUsers();
  </script>
</body>
</html>
