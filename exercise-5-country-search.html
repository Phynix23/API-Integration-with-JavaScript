<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5 - Country Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <input type="text" id="country" placeholder="Enter country name" class="border p-2 rounded">
    <button id="search" class="bg-blue-500 text-white px-4 py-2 rounded">Search</button>
    <div id="result" class="mt-4"></div>

    <script>
        const searchBtn = document.getElementById('search');
        
        searchBtn.addEventListener('click', async () => {
            const name = document.getElementById('country').value;
            const resultDiv = document.getElementById('result');
            
            try {
                const response = await fetch(`https://restcountries.com/v3.1/name/${name}`);
                if (!response.ok) throw new Error('Country not found');
                
                const data = await response.json();
                const country = data[0];
                
                resultDiv.innerHTML = `
                    <div class="border p-4 rounded">
                        <h2 class="font-bold text-xl">${country.name.common}</h2>
                        <p>Capital: ${country.capital?.[0] || 'N/A'}</p>
                        <p>Population: ${country.population.toLocaleString()}</p>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="bg-red-100 text-red-700 p-4 rounded">${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
