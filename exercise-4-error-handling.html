<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4 - Error Handling</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <div id="error1" class="mb-4"></div>
    <div id="error2"></div>

    <script>
        async function testError1() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts/9999');
                if (!response.ok) {
                    throw new Error('Post not found (404)');
                }
            } catch (error) {
                document.getElementById('error1').innerHTML = `
                    <div class="bg-red-100 text-red-700 p-4 rounded">
                        Error: ${error.message}
                    </div>
                `;
            }
        }
        
        async function testError2() {
            try {
                await fetch('https://thisurldoesnotexist.com/api');
            } catch (error) {
                document.getElementById('error2').innerHTML = `
                    <div class="bg-red-100 text-red-700 p-4 rounded">
                        Network Error: ${error.message}
                    </div>
                `;
            }
        }
        
        testError1();
        testError2();
    </script>
</body>
</html>
